<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pawzen974 | Boutique d’accessoires pour animaux</title>
  <meta name="description" content="Pawzen974, boutique en ligne d’accessoires pour chiens et chats à La Réunion." />
  <style>
    :root{
      --bg:#f4fbfa; --card:#fff; --text:#12323a; --muted:#67828a;
      --brand:#2d8f8b; --brand2:#f3c98f; --line:#e2eeed;
      --shadow:0 18px 50px rgba(20,52,59,.09); --radius:26px;
    }
    *{box-sizing:border-box} html{scroll-behavior:smooth}
    body{margin:0;font-family:Inter,Arial,sans-serif;background:linear-gradient(180deg,#fff,#f4fbfa 35%,#ecf7f6);color:var(--text)}
    a{text-decoration:none;color:inherit}
    .container{max-width:1200px;margin:0 auto;padding:24px}
    .topbar{display:flex;justify-content:space-between;gap:18px;align-items:center;flex-wrap:wrap;padding:8px 0 22px}
    .brand{display:flex;align-items:center;gap:12px;font-weight:900;font-size:1.15rem}
    .brand .icon{width:48px;height:48px;border-radius:16px;background:linear-gradient(135deg,var(--brand),#63c1be);display:grid;place-items:center;color:#fff;font-size:22px;box-shadow:0 10px 28px rgba(45,143,139,.24)}
    nav{display:flex;gap:16px;flex-wrap:wrap;color:var(--muted);font-weight:700}
    .cart{background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 16px;font-weight:800;box-shadow:0 8px 24px rgba(20,52,59,.05)}
    .hero{display:grid;grid-template-columns:1.05fr .95fr;gap:24px;align-items:center;padding:18px 0 10px}
    .hero h1{margin:0 0 14px;font-size:clamp(2.7rem,6vw,5rem);line-height:.97;letter-spacing:-1.2px}
    .hero p{margin:0;max-width:58ch;color:var(--muted);line-height:1.8;font-size:1.05rem}
    .actions{display:flex;gap:12px;flex-wrap:wrap;margin-top:26px}
    .btn{padding:14px 20px;border-radius:14px;font-weight:900;border:1px solid transparent;display:inline-block}
    .primary{background:var(--brand);color:#fff;box-shadow:0 14px 30px rgba(45,143,139,.2)}
    .secondary{background:#fff;border-color:var(--line)}
    .hero-card{position:relative;min-height:560px;border-radius:34px;overflow:hidden;background:linear-gradient(180deg,#fff,#eef9f7);border:1px solid var(--line);box-shadow:var(--shadow);padding:22px}
    .blob{position:absolute;border-radius:50%;opacity:.42;filter:blur(4px)}
    .b1{width:240px;height:240px;background:#ffdca9;right:-40px;top:-40px}
    .b2{width:190px;height:190px;background:#b7e8e4;left:-40px;bottom:-60px}
    .tag{position:absolute;left:22px;top:22px;background:#fff;border:1px solid var(--line);border-radius:999px;padding:10px 14px;font-weight:800;color:var(--muted);box-shadow:0 8px 24px rgba(20,52,59,.05);z-index:2}
    .hero-art{position:relative;z-index:1;height:100%;display:grid;place-items:center}
    .badge{
      width:min(360px,82%);aspect-ratio:1/1;border-radius:50%;
      background:linear-gradient(145deg,#2d8f8b,#63c1be);
      box-shadow:inset 0 10px 24px rgba(255,255,255,.18),0 32px 70px rgba(45,143,139,.25);
      display:grid;place-items:center;color:#fff;font-size:clamp(5rem,13vw,8.5rem)
    }
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin:18px 0 0}
    .stat,.card,.panel,.product{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 12px 34px rgba(20,52,59,.05)}
    .stat{padding:18px}.stat strong{display:block;font-size:1.5rem}.stat span{color:var(--muted)}
    .section{padding:42px 0 0}.section h2{margin:0 0 18px;font-size:1.95rem}
    .categories,.products,.split{display:grid;gap:16px}
    .categories{grid-template-columns:repeat(4,1fr)}
    .card{padding:18px;min-height:142px}
    .card .emoji{width:54px;height:54px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,#e8f6f5,#fff1dd);font-size:24px;margin-bottom:14px}
    .card h3{margin:0 0 8px}.card p{margin:0;color:var(--muted);line-height:1.55}
    .products{grid-template-columns:repeat(4,1fr)}
    .product{overflow:hidden}
    .photo{height:190px;background:linear-gradient(180deg,#eaf8f7,#fff3e1);display:grid;place-items:center;font-size:64px}
    .product .body{padding:16px}.product p{margin:8px 0 12px;color:var(--muted);line-height:1.55}
    .price{display:flex;justify-content:space-between;align-items:center;gap:10px}.price strong{font-size:1.05rem;color:var(--brand)}
    .mini-btn{padding:10px 14px;border-radius:12px;background:var(--brand);color:#fff;font-weight:900;font-size:.95rem}
    .split{grid-template-columns:1fr 1fr}
    .panel{padding:22px}.panel p{color:var(--muted);line-height:1.7}
    .list{display:grid;gap:12px;margin-top:16px}
    .list div{padding:14px 16px;border-radius:16px;background:#f8fbfb;border:1px solid var(--line);font-weight:700}
    footer{padding:36px 0 24px;display:flex;justify-content:space-between;gap:18px;flex-wrap:wrap;color:var(--muted);border-top:1px solid var(--line);margin-top:40px}
    .whatsapp{position:fixed;right:18px;bottom:18px;width:60px;height:60px;border-radius:50%;background:#25D366;color:#fff;display:grid;place-items:center;font-size:28px;box-shadow:0 18px 40px rgba(37,211,102,.3);z-index:99}
    @media (max-width:980px){.hero,.split,.categories,.products,.stats{grid-template-columns:1fr 1fr}.hero{grid-template-columns:1fr}.hero-card{min-height:380px}}
    @media (max-width:640px){.categories,.products,.stats,.split{grid-template-columns:1fr}.container{padding:18px}.topbar{align-items:flex-start}}
  </style>
</head>
<body>
